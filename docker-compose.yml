services:
  # Наш бот
  bot:
    build: .
    container_name: bot_4_facebook
    restart: unless-stopped
    env_file: .env
    environment:
      # URL Local Bot API (контейнер bot-api) — файлы до 2 ГБ
      BOT_API_URL: http://bot-api:8081
    depends_on:
      postgres:
        condition: service_healthy
      bot-api:
        condition: service_started
      warp:
        condition: service_started
    volumes:
      # tmp для скачанных видео (не занимает место в контейнере)
      - /tmp/fb_bot:/tmp/fb_bot
      # cookies для Facebook (обновляются через /update_cookies)
      - ./cookies:/app/cookies
      # доступ к файлам Local Bot API (для /update_cookies)
      - bot-api-data:/var/lib/telegram-bot-api


  # Local Bot API — файлы до 2 ГБ без ограничений
  bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "${BOT_API_PORT:-8081}:8081"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
      - /tmp/fb_bot:/tmp/fb_bot

  # Cloudflare WARP — SOCKS5 прокси для обхода блокировок Facebook
  warp:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -x socks5://127.0.0.1:9091 -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -q warp=on"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Автоперезапуск unhealthy контейнеров
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bot_4_facebook}
      POSTGRES_USER: ${DB_USER:-bot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_user} -d ${DB_NAME:-bot_4_facebook}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  bot-api-data:
